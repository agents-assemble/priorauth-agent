name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy typecheck
        run: uv run mypy shared mcp_server a2a_agent

      # Treat pytest exit code 5 ("no tests collected") as benign so the
      # marker filter + sparse-test-directory combinations that happen
      # between scaffold PRs do not break CI. Any real failure (exit 1+)
      # still fails the job. Drop the wrapper once every service directory
      # has at least one test that the filter always matches.
      - name: Pytest (fast)
        shell: bash
        run: |
          set +e
          uv run pytest -m "not llm and not integration" -v
          status=$?
          if [ $status -eq 5 ]; then
            echo "::warning::pytest collected zero tests; treating as success during scaffold"
            exit 0
          fi
          exit $status
